<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Popovers</title>
    <!--Links disponíveis no site do Bootstrap - Versão utilizada nesse documento: v5.2-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<style>
    button {
        margin: 30px;
    }

    /*classe para customizar o Popover*/
    .custom-popover {
        --bs-popover-max-width: 200px; /*Define a largura máxima*/
        --bs-popover-border-color: red; /*Define a cor da borda*/
        --bs-popover-header-bg: red; /*Define a cor do background do header*/
        --bs-popover-header-color: var(--bs-white); /*Define a cor da letra do header*/
        --bs-popover-body-padding-x: 1rem; /*Define o padding do body no eixo x*/
        --bs-popover-body-padding-y: .5rem; /*Define o padding do body no eixo y*/
    }

</style>

<!--

Funções

data-bs- -> "comando" para identificar alguma informação no banco de dados do bootstrap

type="button" -> Identificar no documento que é um botão

classes -> Aplicar características na tag, usando o banco de dados do bootstrap

data-bs-toggle="popover" -> Aplicar a função de Popover

data-bs-title="" -> Título do Popover

data-bs-content="" -> Conteúdo do Popover

OBS: as <div class="m-5"> foram utilizadas para ampliar as margens dos botões
-->

<body>
    <button type="button" class="btn btn-lg btn-danger m-5" data-bs-toggle="popover" data-bs-title="Título do Popover"
        data-bs-content="Conteúdo do Popover - esse conteúdo só vai sair se você apertar nesse botão de novo.">Gatilho
        do Popover</button>


    <!--
        tabindex="0" -> Insere o elemento na ordem natural de tabulação. Ao apertar tab, o conteúdo da tag <a>, que naturalmente
        não entra em tabulação (a não ser que possua href), entra na ordem da tabulação do documento.

        No Popover dispensável, a tag <a> é utilizada para evitar interferências ao alterar o navegador. Em certos navegadores,
        a tag <button> não pode ser usada para aplicar o Popover dispensável. Assim, a solução mais simples foi utilizar a tag <a>.

        data-bs-trigger="focus" -> dá a característica de um popover "dispensável"
        
        data-bs-placement="" define a posição que o popover aparecerá
    -->

    <div class="m-5">
        <a tabindex="0" class="btn btn-lg btn-danger" role="button" data-bs-toggle="popover" data-bs-trigger="focus"
            data-bs-title="Popover 'dispensável'"
            data-bs-content="Conteúdo do Popover - esse conteúdo só vai sair se você apertar em outro lugar.">Popover
            "dispensável"</a>
    </div>

    <div class="m-5">
        <button type="button" class="btn btn-primary" data-bs-container="body" data-bs-toggle="popover"
            data-bs-placement="top" data-bs-content="Conteúdo acima!">
            Popover acima
        </button>

        <button type="button" class="btn btn-secondary" data-bs-container="body" data-bs-toggle="popover"
            data-bs-placement="right" data-bs-content="Conteúdo na direita!"
            data-bs-title="Título só no Popover da direita!">
            Popover na direita
        </button>

        <button type="button" class="btn btn-secondary" data-bs-container="body" data-bs-toggle="popover"
            data-bs-placement="bottom" data-bs-content="Conteúdo embaixo!">
            Popover abaixo
        </button>

        <button type="button" class="btn btn-secondary" data-bs-container="body" data-bs-toggle="popover"
            data-bs-placement="left" data-bs-content="Conteúdo na esquerda!">
            Popover na esquerda
        </button>

    </div>
<!--
    data-bs-custom-class="custom-popover" -> Habilita a customização do popover
-->
    <div class="m-5">
        <button type="button" class="btn btn-primary" data-bs-toggle="popover" data-bs-placement="right"
            data-bs-custom-class="custom-popover" data-bs-title="Popover customizado"
            data-bs-content="Esse Popover foi customizado via variáveis do CSS.">
            Popover customizado
        </button>
    </div>

</body>

<!--Links disponíveis no site do Bootstrap - Versão utilizada nesse documento: v5.2-->

<!--Linkar com o Javascript do Bootstrap-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous">
    </script>

<!--Habilitar o Popover no documento-->
<script>
    const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]')
    const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl))
</script>

</html>
