<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste 01 - BootsTrap </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<style>
    .container {
        background-color: aqua;
    }

    div {
        border: 2px gray solid;
    }
</style>

<body>
    <div class="container text-center">
        <div class="row">
            <div class="col">Olá</div>
            <div class="col">Tudo</div>
            <div class="col">Bem?</div>
            <div class="col">Não.</div>
            <div class="col">FDS</div>
        </div>
        <div class="row">
            <div class="col-8">Olá</div>
            <div class="col-sm-4">Tudo</div>
        </div>
        <div class="row">
            <div class="col">Olá</div>
            <div class="col">Tudo</div>
            <div class="col">Bem?</div>
            <div class="col">Não.</div>
            <div class="col">FDS</div>
        </div>
    </div>

    <div class="container text-center mt-5">
        <div class="row justify-content-start">
            <div class="col">Olá</div>
        </div>
        <div class="row">
            <div class="col align-self-center">Tudo</div>
        </div>
        <div class="row">
            <div class="col align-self-end">Bem?</div>
        </div>
    </div>
    <button type="button" class="btn btn-secondary" data-container="body" data-toggle="popover" data-placement="top"
        data-content="Vivamus sagittis lacus vel augue laoreet rutrum faucibus.">
        Popover on top
    </button>
    <button popovertarget="newsletter-box">
        Mensagens diretas
        Inscreva-se na nossa newsletter!
    </button>
    <div id="newsletter-box" popover>
        <button class="close-btn" popovertarget="newsletter-box" popvertargetaction="hide">
            <span aria-hidden="true">
                X </span>
        </button>
        O conteúdo do meu popup lindão
    </div>
</body>

</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
